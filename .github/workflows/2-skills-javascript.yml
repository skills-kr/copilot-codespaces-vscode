name: "Step 2: Javascript 함수"

# This step triggers after push to main#skills.js.
# This workflow updates from step 2 to step 3.

on:
  workflow_dispatch:
  push:
    paths:
      - "skills.js"
    branches:
      - main

permissions:
  contents: write

jobs:
  get_current_step:
    name: 현재 단계 번호 확인
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - id: get_step
        run: echo "current_step=$(cat ./.github/steps/-step.txt)" >> $GITHUB_OUTPUT
    outputs:
      current_step: ${{ steps.get_step.outputs.current_step }}

  on_functionadded:
    name: Javascript 함수 생성 시
    needs: get_current_step

    if: ${{ !github.event.repository.is_template && needs.get_current_step.outputs.current_step == 2 }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 파일 확인
        uses: skills/action-check-file@v1
        with:
          file: "skills.js"
          search: "function calculateNumbers"

      - name: 3단계로 업데이트
        uses: skills/action-update-step@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          from_step: 2
          to_step: 3

      - name: Workshop Tracker에 단계 보고
        if: success()
        continue-on-error: true
        run: |
          SESSION_ID=$(jq -r '.sessionId' .github/workshop-config.json)
          TRACK=$(jq -r '.track' .github/workshop-config.json)
          API_URL=$(jq -r '.apiUrl' .github/workshop-config.json)
          curl -s -X POST "$API_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"sessionId\": \"$SESSION_ID\",
              \"type\": \"step\",
              \"step\": 2,
              \"description\": \"JS 함수 작성\",
              \"username\": \"$GITHUB_ACTOR\",
              \"repo\": \"$GITHUB_REPOSITORY\",
              \"track\": \"$TRACK\",
              \"runId\": \"$GITHUB_RUN_ID\"
            }" || true

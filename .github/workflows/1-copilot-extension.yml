name: "Step 1: Codespace에서 Copilot 확장"

# This step triggers after push to main#devcontainer.json.
# This workflow updates from step 1 to step 2.

on:
  workflow_dispatch:
  push:
    paths:
      - ".devcontainer/devcontainer.json"
    branches:
      - main

permissions:
  contents: write

jobs:
  get_current_step:
    name: 현재 단계 번호 확인
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - id: get_step
        run: echo "current_step=$(cat ./.github/steps/-step.txt)" >> $GITHUB_OUTPUT
    outputs:
      current_step: ${{ steps.get_step.outputs.current_step }}

  on_add_devcontainer:
    name: Devcontainer 추가 시
    needs: get_current_step

    if: ${{ !github.event.repository.is_template && needs.get_current_step.outputs.current_step == 1 }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 워크플로우 내용 확인
        uses: skills/action-check-file@v1
        with:
          file: ".devcontainer/devcontainer.json"
          search: "GitHub\\.copilot"

      - name: 2단계로 업데이트
        uses: skills/action-update-step@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          from_step: 1
          to_step: 2

      - name: Workshop Tracker에 단계 보고
        if: success()
        continue-on-error: true
        run: |
          SESSION_ID=$(jq -r '.sessionId' .github/workshop-config.json)
          TRACK=$(jq -r '.track' .github/workshop-config.json)
          API_URL=$(jq -r '.apiUrl' .github/workshop-config.json)
          curl -s -X POST "$API_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"sessionId\": \"$SESSION_ID\",
              \"type\": \"step\",
              \"step\": 1,
              \"description\": \"Copilot 확장 추가\",
              \"username\": \"$GITHUB_ACTOR\",
              \"repo\": \"$GITHUB_REPOSITORY\",
              \"track\": \"$TRACK\",
              \"runId\": \"$GITHUB_RUN_ID\"
            }" || true

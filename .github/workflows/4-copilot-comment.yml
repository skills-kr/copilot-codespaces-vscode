name: "Step 4: 주석으로 Copilot 제안 추가"

# This step triggers after push to main#comments.js.
# This step updates from step 4 to step X.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "comments.js"

permissions:
  contents: write

jobs:
  get_current_step:
    name: 현재 단계 번호 확인
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - id: get_step
        run: echo "current_step=$(cat ./.github/steps/-step.txt)" >> $GITHUB_OUTPUT
    outputs:
      current_step: ${{ steps.get_step.outputs.current_step }}

  on_push_to_comments:
    name: 주석에서 생성된 코드
    needs: get_current_step

    if: ${{ !github.event.repository.is_template && needs.get_current_step.outputs.current_step == 4}}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 워크플로우 내용 확인
        uses: skills/action-check-file@v1
        with:
          file: "comments.js"
          search: "Create web server"

      - name: X단계로 업데이트
        uses: skills/action-update-step@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          from_step: 4
          to_step: X

      - name: Workshop Tracker에 완료 보고
        if: success()
        continue-on-error: true
        run: |
          SESSION_ID=$(jq -r '.sessionId' .github/workshop-config.json)
          TRACK=$(jq -r '.track' .github/workshop-config.json)
          API_URL=$(jq -r '.apiUrl' .github/workshop-config.json)
          curl -s -X POST "$API_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"sessionId\": \"$SESSION_ID\",
              \"type\": \"end\",
              \"step\": 4,
              \"description\": \"주석 코드 생성\",
              \"username\": \"$GITHUB_ACTOR\",
              \"repo\": \"$GITHUB_REPOSITORY\",
              \"track\": \"$TRACK\",
              \"runId\": \"$GITHUB_RUN_ID\"
            }" || true
